services:
  # 1. Spring Boot Java Backend
  - type: web
    name: websbond-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: DB_HOST
        fromDatabase:
          name: websbond-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: websbond-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: websbond-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: websbond-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: websbond-db
          property: password
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      # Allowed origins for CORS to allow secure connections from live frontend domains
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://websbond-frontend.onrender.com,https://websbond.com,https://www.websbond.com,http://localhost:5173

  # 2. React Vite Frontend (Static Site)
  - type: web
    name: websbond-frontend
    runtime: static
    rootDir: agency
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://websbond-backend.onrender.com
      - key: VITE_GOOGLE_SITE_VERIFICATION
        value: ""
    routes:
      - type: rewrite
        source: /sitemap.xml
        destination: https://websbond-backend.onrender.com/api/sitemap.xml
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # 3. PostgreSQL Database
  - name: websbond-db
    plan: free
