    <!-- WebsBond OS — page tracking -->
    <script>
    (function(){
      var API = "https://ai-support-pilot-30.lovable.app/api/public/track";
      var sid = localStorage.getItem("wb_sid");
      if(!sid){
        sid = (crypto.randomUUID ? crypto.randomUUID() : Date.now()+"-"+Math.random());
        localStorage.setItem("wb_sid", sid);
      }
      var q = new URLSearchParams(location.search);
      fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          session_id: sid,
          path: location.pathname + location.search,
          referrer: document.referrer || "",
          utm_source:   q.get("utm_source")   || "",
          utm_medium:   q.get("utm_medium")   || "",
          utm_campaign: q.get("utm_campaign") || ""
        }),
        keepalive: true
      }).catch(function(){});
    })();
    </script>
