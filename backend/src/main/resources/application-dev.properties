# ── Dev Profile Overrides ──
# This profile is active when running locally via `--spring.profiles.active=dev`

spring.datasource.url=jdbc:h2:mem:websbonddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080

# Dev admin key (must be overridden via env in production)
admin.secret-key=websbond-admin-dev-key
