# Server Port Configuration
server.port=8081


# Spring DataSource Settings (H2 Dev DB by default, PostgreSQL in Production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:websbonddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Spring JPA Properties
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console configuration (only active in dev mode)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Logging configurations
logging.level.org.springframework.web=INFO
logging.level.com.websbond.api=DEBUG

# ── Notification Settings ──
# Telegram: set NOTIFICATION_TELEGRAM_BOT_TOKEN and NOTIFICATION_TELEGRAM_CHAT_ID on Render
notification.telegram.bot-token=${NOTIFICATION_TELEGRAM_BOT_TOKEN:}
notification.telegram.chat-id=${NOTIFICATION_TELEGRAM_CHAT_ID:}

# WhatsApp via CallMeBot: set NOTIFICATION_CALLMEBOT_PHONE and NOTIFICATION_CALLMEBOT_APIKEY on Render
notification.callmebot.phone=${NOTIFICATION_CALLMEBOT_PHONE:}
notification.callmebot.apikey=${NOTIFICATION_CALLMEBOT_APIKEY:}
