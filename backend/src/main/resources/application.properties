# ── Base Application Configuration ──
# Profile-specific overrides in application-dev.properties and application-prod.properties

# Server
server.port=${PORT:8081}

# Default profile (safe for local dev without specifying profile)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.websbond.api=DEBUG

# Notification Settings (all from env vars, no defaults)
notification.telegram.bot-token=${NOTIFICATION_TELEGRAM_BOT_TOKEN:}
notification.telegram.chat-id=${NOTIFICATION_TELEGRAM_CHAT_ID:}
notification.callmebot.phone=${NOTIFICATION_CALLMEBOT_PHONE:}
notification.callmebot.apikey=${NOTIFICATION_CALLMEBOT_APIKEY:}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080}
